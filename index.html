<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomia Humana — Master Class</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Quicksand', sans-serif; }
    .title-font { font-family: 'Fredoka', sans-serif; }
    
    .game-bg {
      background: #0a0e27;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }
    
    .glass-panel {
      background: rgba(15, 25, 50, 0.8);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(0, 255, 0, 0.3);
      box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1), 0 0 30px rgba(0, 255, 0, 0.2);
      color: white;
      position: relative;
      z-index: 1;
    }

    .draggable {
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: all 0.2s ease;
    }
    .draggable:hover { transform: translateY(-2px); border-color: #00ff00; }
    .draggable.dragging { opacity: 0.5; cursor: grabbing; }
    
    .slot {
      transition: all 0.3s ease;
      border: 2px dashed rgba(0, 255, 0, 0.3);
      background: rgba(255, 255, 255, 0.03);
    }
    .slot.highlight { border-color: #00ff00; background: rgba(0, 255, 0, 0.1); }
    .slot.correct { border: 2px solid #00ff00; background: rgba(0, 255, 0, 0.05); }
    .slot.incorrect { border: 2px solid #ff0000; animation: shake 0.4s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .coin {
      position: fixed;
      pointer-events: none;
      animation: explode 0.8s ease-out forwards;
      z-index: 1000;
    }
    @keyframes explode {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
  </style>
 </head>
 <body class="game-bg">
  <div id="app" class="h-full w-full flex flex-col">
   
   <div id="start-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-panel rounded-3xl p-8 max-w-lg w-full text-center">
     <div class="text-6xl mb-4">🩺</div>
     <h1 class="title-font text-4xl font-bold text-green-400 mb-2">Anatomia Interativa</h1>
     <p class="text-gray-300 mb-8">Introdução, Divisão e Terminologia</p>
     <input type="text" id="player-name" placeholder="Digite seu nome..." class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-green-500 text-white mb-6 focus:outline-none">
     <button id="start-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold transition"> INICIAR DESAFIO </button>
    </div>
   </div>

   <div id="game-screen" class="h-screen hidden flex flex-col">
    <div class="glass-panel px-6 py-4 flex items-center justify-between">
     <div class="flex gap-6">
       <div><p class="text-xs text-gray-400">FASE</p><p id="level-display" class="font-bold text-green-400">1/7</p></div>
       <div><p class="text-xs text-gray-400">PONTOS</p><p id="score-display" class="font-bold text-amber-500">0</p></div>
     </div>
     <div class="flex-1 max-w-xs mx-4">
       <div id="timer-display" class="text-center text-xs mb-1">4:00</div>
       <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
         <div id="timer-bar" class="bg-green-500 h-full transition-all" style="width: 100%"></div>
       </div>
     </div>
     <button id="check-btn" class="px-6 py-2 bg-green-600 rounded-lg font-bold hover:bg-green-500"> VERIFICAR </button>
    </div>

    <div class="flex-1 flex overflow-hidden p-4 gap-4">
     <div class="w-1/3 glass-panel rounded-2xl p-4 overflow-y-auto">
      <h3 class="text-sm font-bold text-gray-400 mb-4 uppercase">Arraste as Respostas:</h3>
      <div id="items-container" class="space-y-3"></div>
     </div>
     <div class="w-2/3 glass-panel rounded-2xl p-4 overflow-y-auto">
      <h3 id="level-title" class="text-xl font-bold text-green-400 mb-1">Título</h3>
      <p id="level-desc" class="text-sm text-gray-400 mb-6">Descrição</p>
      <div id="slots-container" class="grid grid-cols-1 gap-4"></div>
     </div>
    </div>
   </div>

   <div id="end-screen" class="min-h-screen hidden flex items-center justify-center p-4">
    <div class="glass-panel rounded-3xl p-10 text-center max-w-md">
     <h2 class="text-3xl font-bold text-green-400 mb-4">Missão Cumprida!</h2>
     <p class="mb-6">Você demonstrou excelente conhecimento anatômico.</p>
     <div class="text-5xl font-bold text-white mb-8" id="final-score">0</div>
     <button onclick="location.reload()" class="px-8 py-3 bg-green-600 rounded-xl font-bold">JOGAR NOVAMENTE</button>
    </div>
   </div>
  </div>

  <script>
    // Efeitos sonoros
    const audio = {
      play(freq, type = 'sine', duration = 0.1, volume = 0.1) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      }
    };

    const LEVELS = [
      {
        title: "Fase 1: Conceitos Iniciais",
        desc: "Diferencie os tipos de variações morfológicas.",
        items: [
          { id: "v1", text: "Diferença que não atrapalha a função." },
          { id: "v2", text: "Alteração que traz prejuízo funcional." },
          { id: "v3", text: "Anomalia grave incompatível com a vida." }
        ],
        slots: [
          { label: "Variação Anatômica", correct: "v1" },
          { label: "Anomalia", correct: "v2" },
          { label: "Monstruosidade", correct: "v3" }
        ]
      },
      {
        title: "Fase 2: Divisão do Corpo (I)",
        desc: "Identifique as partes principais e pescoço.",
        items: [
          { id: "d1", text: "Dividida em Crânio e Face." },
          { id: "d2", text: "Conexão entre a cabeça e o tronco." },
          { id: "d3", text: "Composto por Tórax, Abdome e Pelve." }
        ],
        slots: [
          { label: "Cabeça", correct: "d1" },
          { label: "Pescoço", correct: "d2" },
          { label: "Tronco", correct: "d3" }
        ]
      },
      {
        title: "Fase 3: Divisão do Corpo (II)",
        desc: "Subdivisões dos membros.",
        items: [
          { id: "m1", text: "Ombro, Braço, Antebraço e Mão." },
          { id: "m2", text: "Quadril, Coxa, Perna e Pé." }
        ],
        slots: [
          { label: "Membros Superiores", correct: "m1" },
          { label: "Membros Inferiores", correct: "m2" }
        ]
      },
      {
        title: "Fase 4: Posição Anatômica",
        desc: "Defina o padrão de referência universal.",
        items: [
          { id: "p1", text: "Corpo ereto, olhar para o horizonte, face para frente." },
          { id: "p2", text: "Palmas voltadas para frente (supinação)." },
          { id: "p3", text: "Pés unidos com pontas para frente." }
        ],
        slots: [
          { label: "Cabeça e Olhar", correct: "p1" },
          { label: "Mãos", correct: "p2" },
          { label: "Pés", correct: "p3" }
        ]
      },
      {
        title: "Fase 5: Planos de Delimitação",
        desc: "Como o corpo é dividido no espaço?",
        items: [
          { id: "s1", text: "Divide o corpo em metades Direita e Esquerda." },
          { id: "s2", text: "Divide em partes Anterior e Posterior." },
          { id: "s3", text: "Divide em partes Superior e Inferior." }
        ],
        slots: [
          { label: "Plano Sagital", correct: "s1" },
          { label: "Plano Frontal", correct: "s2" },
          { label: "Plano Transversal", correct: "s3" }
        ]
      },
      {
        title: "Fase 6: Termos de Relação",
        desc: "Localização relativa das estruturas.",
        items: [
          { id: "r1", text: "Mais próxima da cabeça (parte de cima)." },
          { id: "r2", text: "Mais próxima da planta dos pés." },
          { id: "r3", text: "Mais próxima da linha média do corpo." }
        ],
        slots: [
          { label: "Superior (Cranial)", correct: "r1" },
          { label: "Inferior (Podálico)", correct: "r2" },
          { label: "Medial", correct: "r3" }
        ]
      },
      {
        title: "Fase 7: Termos de Comparação",
        desc: "Distância em relação à raiz do membro.",
        items: [
          { id: "c1", text: "Mais próximo da raiz do membro ou tronco." },
          { id: "c2", text: "Mais afastado da raiz do membro." },
          { id: "c3", text: "Estrutura situada entre Lateral e Medial." }
        ],
        slots: [
          { label: "Proximal", correct: "c1" },
          { label: "Distal", correct: "c2" },
          { label: "Intermédio", correct: "c3" }
        ]
      }
    ];

    let state = {
      level: 0,
      score: 0,
      timeLeft: 240,
      draggedId: null,
      selections: {}
    };

    function init() {
      document.getElementById('start-btn').onclick = () => {
        showScreen('game');
        loadLevel();
        startTimer();
      };
      document.getElementById('check-btn').onclick = checkLevel;
    }

    function loadLevel() {
      const lvl = LEVELS[state.level];
      state.selections = {};
      document.getElementById('level-display').textContent = `${state.level + 1}/${LEVELS.length}`;
      document.getElementById('level-title').textContent = lvl.title;
      document.getElementById('level-desc').textContent = lvl.desc;
      
      const itemsCont = document.getElementById('items-container');
      itemsCont.innerHTML = '';
      [...lvl.items].sort(() => Math.random() - 0.5).forEach(item => {
        const div = document.createElement('div');
        div.className = 'draggable p-3 bg-gray-800 border border-gray-700 rounded-lg text-sm';
        div.textContent = item.text;
        div.draggable = true;
        div.ondragstart = () => state.draggedId = item.id;
        itemsCont.appendChild(div);
      });

      const slotsCont = document.getElementById('slots-container');
      slotsCont.innerHTML = '';
      lvl.slots.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = 'slot p-4 rounded-xl flex flex-col gap-2';
        div.innerHTML = `<span class="text-xs font-bold text-green-500 uppercase">${slot.label}</span>
                         <div class="drop-zone h-10 flex items-center text-sm italic text-gray-500">Arraste aqui...</div>`;
        
        div.ondragover = (e) => { e.preventDefault(); div.classList.add('highlight'); };
        div.ondragleave = () => div.classList.remove('highlight');
        div.ondrop = () => {
          div.classList.remove('highlight');
          const item = lvl.items.find(it => it.id === state.draggedId);
          state.selections[i] = item.id;
          div.querySelector('.drop-zone').textContent = item.text;
          div.querySelector('.drop-zone').classList.remove('italic', 'text-gray-500');
          div.querySelector('.drop-zone').classList.add('text-white');
          audio.play(600, 'sine', 0.05);
        };
        slotsCont.appendChild(div);
      });
    }

    function checkLevel() {
      const lvl = LEVELS[state.level];
      let correctCount = 0;
      const slots = document.querySelectorAll('.slot');
      
      lvl.slots.forEach((slot, i) => {
        if (state.selections[i] === slot.correct) {
          slots[i].classList.add('correct');
          correctCount++;
        } else {
          slots[i].classList.add('incorrect');
          audio.play(150, 'sawtooth', 0.2, 0.2);
          setTimeout(() => slots[i].classList.remove('incorrect'), 500);
        }
      });

      if (correctCount === lvl.slots.length) {
        state.score += 100 + (state.level * 50);
        document.getElementById('score-display').textContent = state.score;
        confetti(slots[0]);
        audio.play(800, 'triangle', 0.3);
        setTimeout(() => {
          state.level++;
          if (state.level < LEVELS.length) loadLevel();
          else endGame();
        }, 1200);
      }
    }

    function confetti(target) {
      const rect = target.getBoundingClientRect();
      for (let i = 0; i < 10; i++) {
        const c = document.createElement('div');
        c.className = 'coin text-xl';
        c.innerHTML = '✨';
        c.style.left = rect.left + 'px';
        c.style.top = rect.top + 'px';
        c.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
        c.style.setProperty('--ty', (Math.random() * 200 - 100) + 'px');
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 800);
      }
    }

    function startTimer() {
      const timer = setInterval(() => {
        state.timeLeft--;
        const mins = Math.floor(state.timeLeft / 60);
        const secs = state.timeLeft % 60;
        document.getElementById('timer-display').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        document.getElementById('timer-bar').style.width = (state.timeLeft / 240 * 100) + '%';
        if (state.timeLeft <= 0) { clearInterval(timer); endGame(); }
      }, 1000);
    }

    function showScreen(id) {
      document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(`${id}-screen`).classList.remove('hidden');
    }

    function endGame() {
      showScreen('end');
      document.getElementById('final-score').textContent = state.score;
    }

    init();
  </script>
 </body>
</html>
